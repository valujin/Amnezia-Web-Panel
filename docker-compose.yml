version: '3.8'

services:
  amnezia_panel:
    build:
      context: .
      dockerfile: Dockerfile
    image: valujin/amnezia-panel:local
    container_name: amnezia_panel

    pull_policy: build

    ports:
      - "${APP_PORT:-5000}:5000"

    volumes:
      - amnezia_data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.connect(('localhost', 5000)); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  amnezia_data:
